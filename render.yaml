services:
  - type: web
    name: ai-governance-api
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120 --access-logfile - --error-logfile -"
    preDeployCommand: "python manage.py migrate --noinput"
    healthCheckPath: "/api/health/"
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-governance-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: ai-governance-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: ai-governance-redis
          property: port
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: ai-governance-worker
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker -l INFO"
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: ai-governance-api
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: ai-governance-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: ai-governance-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: ai-governance-redis
          property: port
      - key: SENTRY_DSN
        sync: false

  - type: keyvalue
    name: ai-governance-redis
    plan: starter
    ipAllowList: []

databases:
  - name: ai-governance-db
    plan: basic-256mb
    diskSizeGB: 1
    databaseName: governance
    user: governance
