services:
  - type: web
    name: ai-governance-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120 --access-logfile - --error-logfile -"
    healthCheckPath: "/api/health/"
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://ai-governance-frontend.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://ai-governance-frontend.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-governance-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: ai-governance-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: ai-governance-redis
          property: port
      - key: SENTRY_DSN
        sync: false

  - type: keyvalue
    name: ai-governance-redis
    plan: free
    ipAllowList: []

  - type: web
    name: ai-governance-frontend
    runtime: static
    buildCommand: "npm ci --prefix frontend && npm run build --prefix frontend"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://ai-governance-api.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ai-governance-db
    plan: free
    databaseName: governance
    user: governance
