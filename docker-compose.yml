services:
  api:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_ENV: local
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: unsafe-local-dev-key-change-me
      DATABASE_URL: postgres://governance:governance@db:5432/governance
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A config worker -l INFO
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_ENV: local
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: unsafe-local-dev-key-change-me
      DATABASE_URL: postgres://governance:governance@db:5432/governance
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - api
      - db
      - redis

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: governance
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: governance
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres18_data:
